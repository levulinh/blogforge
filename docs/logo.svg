<svg xmlns="http://www.w3.org/2000/svg" width="800" height="140" viewBox="0 0 800 140">
  <!-- Background -->
  <rect width="800" height="140" fill="#1e1f29" rx="12"/>

  <!-- Subtle grid lines for terminal feel -->
  <line x1="0" y1="36" x2="800" y2="36" stroke="#2d2f3e" stroke-width="1"/>

  <!-- Terminal dots -->
  <circle cx="22" cy="18" r="5" fill="#ff5f57"/>
  <circle cx="42" cy="18" r="5" fill="#febc2e"/>
  <circle cx="62" cy="18" r="5" fill="#28c840"/>

  <!-- Prompt symbol -->
  <text x="32" y="100" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="28" font-weight="bold" fill="#6272a4">$</text>

  <!-- "BlogForge" main title -->
  <text x="68" y="100" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="52" font-weight="bold" letter-spacing="-1">
    <tspan fill="#8be9fd">Blog</tspan><tspan fill="#ff79c6">Forge</tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="358" y="58" width="6" height="48" fill="#f8f8f2" opacity="0.8" rx="1"/>

  <!-- Subtitle -->
  <text x="68" y="125" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace" font-size="13" fill="#6272a4" letter-spacing="0.5">AI-powered multi-agent blog writer · OpenAI Agents SDK + OpenRouter + Tavily</text>
</svg>
